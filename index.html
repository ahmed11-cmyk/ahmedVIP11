<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الأكواد | حمادة</title>
    <style>
        :root {
            --primary-color: #00ff88;
            --bg-color: #0f0f13;
            --card-bg: #1a1a24;
            --text-color: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* تأثير الدخول المتحرك */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            padding: 40px 20px;
            animation: fadeInDown 1s ease-out;
            border-bottom: 2px solid var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
        }

        header a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        
        header a:hover {
            color: var(--primary-color);
        }

        /* قسم الاشتراكات */
        .packages-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            animation: fadeInUp 1.2s ease-out;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 30px;
            width: 250px;
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .card p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #aaa;
        }

        /* قسم الطلب (نظام البوت) */
        .order-section {
            background-color: var(--card-bg);
            max-width: 600px;
            margin: 20px auto 60px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: fadeInUp 1.5s ease-out;
            border: 1px solid #333;
        }

        .order-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            background-color: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #00cc6a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        /* الفوتر */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #0a0a0d;
            border-top: 1px solid #333;
            color: #777;
        }

        .rights {
            color: var(--primary-color);
            font-weight: bold;
        }

        #statusMessage {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>متجر الأكواد الاحترافي</h1>
        <p>التواصل عبر تيليجرام: <a href="https://t.me/l_2qu" target="_blank">@l_2qu</a></p>
    </header>

    <div class="packages-container">
        <div class="card">
            <h3>كود يومي</h3>
            <p>اشتراك لمدة 24 ساعة كاملة</p>
        </div>
        <div class="card">
            <h3>كود أسبوعي</h3>
            <p>اشتراك لمدة 7 أيام</p>
        </div>
        <div class="card">
            <h3>كود نصف شهر</h3>
            <p>اشتراك لمدة 15 يوم</p>
        </div>
        <div class="card">
            <h3>كود شهري</h3>
            <p>اشتراك لمدة 30 يوم</p>
        </div>
        <div class="card">
            <h3>موسم كامل</h3>
            <p>اشتراك VIP لمدة 60 يوم</p>
        </div>
    </div>

    <div class="order-section">
        <h2>طلب كود جديد</h2>
        <form id="orderForm">
            <div class="form-group">
                <input type="text" id="userName" placeholder="الاسم الكامل" required>
            </div>
            <div class="form-group">
                <input type="text" id="tgUsername" placeholder="يوزر التيليجرام (مثل: @username)" required>
            </div>
            <div class="form-group">
                <select id="packageType" required>
                    <option value="" disabled selected>اختر نوع الاشتراك...</option>
                    <option value="يومي (24 ساعة)">يومي (24 ساعة)</option>
                    <option value="أسبوعي (7 أيام)">أسبوعي (7 أيام)</option>
                    <option value="نصف شهر (15 يوم)">نصف شهر (15 يوم)</option>
                    <option value="شهري (30 يوم)">شهري (30 يوم)</option>
                    <option value="موسم كامل (60 يوم)">موسم كامل (60 يوم)</option>
                </select>
            </div>
            <button type="submit">إرسال الطلب للبوت</button>
            <p id="statusMessage"></p>
        </form>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | تطوير <span class="rights">حمادة</span></p>
    </footer>

    <script>
        // إعدادات بوت التيليجرام الخاصة بك
        const BOT_TOKEN ='8681184437:AAFhGb1egorcI2DgPcZFYNXnIp0E4rFTj3o'; 
        const CHAT_ID = '7871770473'; 

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('userName').value.trim();
            const tgUser = document.getElementById('tgUsername').value.trim();
            const pack = document.getElementById('packageType').value;
            const statusMsg = document.getElementById('statusMessage');

            // 1. فحص صيغة يوزر التيليجرام (نظام الحماية من الكذابين)
            // الشروط: يبدأ بـ @، أحرف إنجليزية وأرقام و _ فقط، طوله بين 5 و 32
            const tgRegex = /^@[a-zA-Z0-9_]{5,32}$/;
            
            if (!tgRegex.test(tgUser)) {
                statusMsg.style.display = 'block';
                statusMsg.style.color = '#ffaa00'; // لون برتقالي للتنبيه
                statusMsg.innerText = '⚠️ يوزر التيليجرام غير صحيح! يجب أن يبدأ بـ @ ويحتوي على أحرف إنجليزية وأرقام فقط (مثال: @username).';
                return; // إيقاف العملية وعدم إرسال الطلب
            }

            // في حال كان اليوزر صحيحاً، نظهر رسالة جاري الإرسال
            statusMsg.style.display = 'block';
            statusMsg.style.color = 'white';
            statusMsg.innerText = '⏳ جاري إرسال الطلب...';

            // تجهيز الرسالة
            const textMessage = `
🌟 طلب كود جديد 🌟
==================
👤 الاسم: ${name}
🔗 يوزر التيليجرام: ${tgUser}
📦 نوع الاشتراك: ${pack}
==================
المرسل عبر موقع: حمادة
            `;

            // إرسال البيانات عبر API تيليجرام
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: textMessage
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.ok) {
                    statusMsg.style.color = '#00ff88';
                    statusMsg.innerText = '✅ تم إرسال الطلب بنجاح! سيتم التواصل معك.';
                    document.getElementById('orderForm').reset();
                } else {
                    statusMsg.style.color = 'red';
                    statusMsg.innerText = '❌ حدث خطأ أثناء الإرسال. تأكد من إعدادات البوت.';
                }
            })
            .catch(error => {
                statusMsg.style.color = 'red';
                statusMsg.innerText = '❌ تعذر الاتصال بالخادم.';
            });
        });
    </script>
</body>
</html>
