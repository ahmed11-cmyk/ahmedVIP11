<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد | مطور Drive</title>
    <!-- استدعاء خطوط جوجل العربية (تاجوال) -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- استدعاء أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* الإعدادات الأساسية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #030712;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة احترافية (تأثير النيون الأزرق) */
        .background-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 115, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: pulseBackground 6s infinite alternate;
        }

        /* حاوية البطاقة */
        .card-container {
            position: relative;
            z-index: 10;
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(0, 168, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 115, 255, 0.2), inset 0 0 15px rgba(0, 115, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* تصميم اللوجو */
        .logo {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #00a8ff;
            box-shadow: 0 0 25px rgba(0, 168, 255, 0.6);
            margin-bottom: 25px;
            animation: float 4s ease-in-out infinite;
        }

        /* النصوص */
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(0, 168, 255, 0.8);
            letter-spacing: 1px;
        }

        h2 {
            font-size: 1.2rem;
            color: #00a8ff;
            font-weight: 700;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        /* زر التليجرام */
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(90deg, #0088cc, #0056b3);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.4);
            border: 1px solid transparent;
        }

        .telegram-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: linear-gradient(90deg, #00a8ff, #0088cc);
            box-shadow: 0 12px 30px rgba(0, 168, 255, 0.6);
            border: 1px solid #00a8ff;
        }

        .telegram-btn i {
            font-size: 1.5rem;
            animation: wiggle 2s infinite;
        }

        /* الفوتر (حقوق المطور) */
        .footer {
            position: relative;
            z-index: 10;
            margin-top: 30px;
            color: #555c6b;
            font-size: 0.9rem;
            font-weight: 700;
            animation: fadeIn 2s ease-in;
        }

        .footer span {
            color: #00a8ff;
            text-shadow: 0 0 5px rgba(0, 168, 255, 0.3);
        }

        /* الحركات (Animations) */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); box-shadow: 0 0 40px rgba(0, 168, 255, 0.8); }
            100% { transform: translateY(0px); }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseBackground {
            from { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            to { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
    </style>
</head>
<body>

    <!-- مؤثرات الخلفية -->
    <div class="background-glow"></div>

    <!-- بطاقة المحتوى -->
    <div class="card-container">
        <!-- استخدام صورتك المرفقة -->
        <img src="content (5).png" alt="Drive VIP Logo" class="logo">
        
        <h1>أحمد</h1>
        <h2>مطور Drive</h2>
        
        <!-- رابط التليجرام الخاص بك -->
        <a href="https://t.me/l_2qu" target="_blank" class="telegram-btn">
            <i class="fab fa-telegram-plane"></i>
            تواصل معي 
        </a>
    </div>

    <!-- حقوق المطور -->
    <div class="footer">
        مطور الموقع <span>حمادة</span> &copy; 2026
    </div>

</body>
</html>
