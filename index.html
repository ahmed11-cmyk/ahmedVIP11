<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HACKER PANEL | @l_2qu</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New', monospace}
    body{background:#000;color:#00ff00;overflow:hidden}
   .scanline{position:fixed;top:0;left:0;width:100%;height:2px;background:rgba(0,255,0,0.3);animation:scan 3s linear infinite}
    @keyframes scan{0%{top:0}100%{top:100%}}

    header{background:#001100;border-bottom:2px solid #00ff00;padding:15px;text-align:center}
    header h1{font-size:28px;text-shadow:0 0 10px #00ff00}
   .target{color:#ff0000;font-weight:bold}

   .container{display:flex;height:calc(100vh - 70px)}

    /* شاشة الهكر */
   .terminal{flex:1;background:#000;padding:20px;overflow-y:auto;border-right:2px solid #00ff00}
   .line{margin:5px 0;font-size:14px}
   .success{color:#00ff00}
   .error{color:#ff0000}
   .warning{color:#ffff00}

    /* لوحة الادمن */
   .admin{width:350px;background:#001100;padding:20px;border-left:2px solid #00ff00}
   .admin h2{color:#00ff00;text-align:center;margin-bottom:20px}
    input,select{width:100%;padding:10px;margin:10px 0;background:#000;border:1px solid #00ff00;color:#00ff00}
    button{width:100%;padding:12px;background:#00ff00;color:#000;border:none;font-weight:bold;cursor:pointer;margin:5px 0}
    button:hover{background:#00cc00}
   .stats{background:#000;padding:10px;border:1px solid #00ff00;margin:10px 0}
</style>
</head>
<body>
<div class="scanline"></div>

<header>
    <h1>⚡ HACKER TERMINAL v9.9 ⚡</h1>
    <p>الهدف الحالي: <span class="target" id="targetUser">@l_2qu</span></p>
</header>

<div class="container">
    <!-- شاشة الاكواد -->
    <div class="terminal" id="terminal">
        <div class="line">[SYSTEM] مرحبا @l_2qu - تم تشغيل النظام...</div>
        <div class="line">[SYSTEM] انتظر اوامر الادمن</div>
    </div>

    <!-- لوحة الادمن -->
    <div class="admin">
        <h2>⚙️ لوحة التحكم</h2>

        <label>اليوزر المستهدف:</label>
        <input type="text" id="userInput" value="@l_2qu">
        <button onclick="setTarget()">تغيير الهدف</button>

        <label>سرعة الهجوم:</label>
        <select id="speed">
            <option value="200">بطيء</option>
            <option value="100" selected>متوسط</option>
            <option value="50">سريع</option>
        </select>

        <button onclick="startHack()">🚀 بدء الاختراق</button>
        <button onclick="stopHack()" style="background:#ff0000;color:#fff">⏹️ ايقاف</button>
        <button onclick="clearTerminal()">🧹 مسح الشاشة</button>

        <div class="stats">
            <p>الحالة: <span id="status">متوقف</span></p>
            <p>التقدم: <span id="progress">0%</span></p>
        </div>
    </div>
</div>

<script>
let hacking = false;
let hackInterval;
let progress = 0;

const messages = [
    "[SCANNING] جاري مسح الشبكة...",
    "[FOUND] تم العثور على IP: 192.168.1.***",
    "[PORT] المنفذ 443 مفتوح",
    "[BRUTE] محاولة كلمة سر: 123456",
    "[BRUTE] محاولة كلمة سر: password",
    "[SUCCESS] تم تجاوز الجدار الناري",
    "[DATA] جاري سحب البيانات...",
    "[PHOTO] تم استخراج صورة البروفايل",
    "[INFO] المتابعين: 1.2M",
    "[INFO] اللايكات: 45.6M",
    "[DECRYPT] فك التشفير 12%...",
    "[DECRYPT] فك التشفير 45%...",
    "[DECRYPT] فك التشفير 78%...",
    "[WARNING] تم اكتشاف مضاد فيروسات",
    "[BYPASS] تجاوز الحماية بنجاح",
    "[FINAL] الوصول الكامل تم",
    "[DONE] الاختراق مكتمل 100%"
];

function addLine(text, className=''){
    const term = document.getElementById('terminal');
    const div = document.createElement('div');
    div.className = 'line ' + className;
    div.innerHTML = text;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
}

function setTarget(){
    const user = document.getElementById('userInput').value;
    document.getElementById('targetUser').innerHTML = user;
    addLine(`[SYSTEM] تم تغيير الهدف الى: ${user}`, 'warning');
}

function startHack(){
    if(hacking) return;
    hacking = true;
    progress = 0;
    document.getElementById('status').innerHTML = 'جاري...';
    document.getElementById('status').style.color = '#ffff00';

    let i = 0;
    const speed = document.getElementById('speed').value;

    hackInterval = setInterval(()=>{
        if(i < messages.length){
            let msg = messages[i].replace('@user', document.getElementById('userInput').value);
            let cls = msg.includes('SUCCESS')? 'success' : msg.includes('ERROR')? 'error' : msg.includes('WARNING')? 'warning' : '';
            addLine(msg, cls);
            progress += 100 / messages.length;
            document.getElementById('progress').innerHTML = Math.floor(progress) + '%';
            i++;
        }else{
            stopHack();
            addLine('[SYSTEM] المهمة اكتملت بنجاح', 'success');
        }
    }, speed);
}

function stopHack(){
    hacking = false;
    clearInterval(hackInterval);
    document.getElementById('status').innerHTML = 'متوقف';
    document.getElementById('status').style.color = '#ff0000';
}

function clearTerminal(){
    document.getElementById('terminal').innerHTML = '<div class="line">[SYSTEM] تم مسح الشاشة</div>';
    progress = 0;
    document.getElementById('progress').innerHTML = '0%';
}

// تشغيل تلقائي عند الفتح
window.onload = () => {
    setTimeout(()=>addLine('[SYSTEM] النظام جاهز للعمل', 'success'), 1000);
}
</script>

</body>
</html>
