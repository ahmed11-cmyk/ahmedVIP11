<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HMDHMD Luxury Store | متجر النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #d4af37; --bg: #050505; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; }
        
        /* الهيدر */
        header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #111, #050505); border-bottom: 2px solid var(--primary); }
        .hero-title { font-size: 45px; font-weight: 900; color: var(--primary); margin: 0; }
        
        /* الشبكة */
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 40px; max-width: 1200px; margin: auto; }
        .product-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; transition: 0.4s; text-align: center; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .product-img { width: 100%; height: 200px; background: #222; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        
        /* زر الشراء */
        .buy-btn { background: var(--primary); color: #000; padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        /* لوحة التحكم */
        #admin-panel { display: none; background: #000; padding: 30px; border: 2px solid var(--primary); margin: 40px; border-radius: 20px; }
        .admin-input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h1 class="hero-title">HMDHMD LUXURY</h1>
        <p>متجر النخبة - منتجات حصرية وخدمة مميزة</p>
    </header>

    <div class="products-container" id="product-list"></div>

    <div style="text-align:center; padding: 50px;">
        <button onclick="openAdmin()" style="background: transparent; color: #444; border:none; cursor:pointer;">⚙️</button>
    </div>

    <div id="admin-panel">
        <h2 style="color:var(--primary)">لوحة تحكم المطور حمدمد</h2>
        <input type="text" class="admin-input" id="t" placeholder="Bot Token">
        <input type="text" class="admin-input" id="c" placeholder="Chat ID">
        <button onclick="save()" class="buy-btn">حفظ الإعدادات</button>
    </div>

    <script>
        const products = [
            { id: 1, name: "ساعة رولكس ذهبية", price: "850$", icon: "⌚" },
            { id: 2, name: "سماعة أبل برو", price: "250$", icon: "🎧" },
            { id: 3, name: "نظارات شمسية برادا", price: "180$", icon: "🕶️" },
            { id: 4, name: "حقيبة جلد طبيعي", price: "320$", icon: "👜" },
            { id: 5, name: "عطر فرنسي حصري", price: "150$", icon: "🧴" },
            { id: 6, name: "خاتم ألماس ملكي", price: "990$", icon: "💍" },
            { id: 7, name: "حذاء رياضي ليمتد", price: "280$", icon: "👟" },
            { id: 8, name: "قلم ذهبي مطلي", price: "110$", icon: "🖋️" },
            { id: 9, name: "سلسلة فضة نادرة", price: "190$", icon: "⛓️" },
            { id: 10, name: "محفظة كارد هولدر", price: "90$", icon: "💳" }
        ];

        function loadProducts() {
            const list = document.getElementById('product-list');
            products.forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <div class="product-img">${p.icon}</div>
                        <h3>${p.name}</h3>
                        <p style="color:var(--primary); font-size:20px; font-weight:bold;">${p.price}</p>
                        <button class="buy-btn" onclick="buy('${p.name}', '${p.price}')">طلب المنتج الآن</button>
                    </div>
                `;
            });
        }

        function openAdmin() {
            const pass = prompt("أدخل رمز المطور:");
            if(pass === "749515892") {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('t').value = localStorage.getItem('bt') || '';
                document.getElementById('c').value = localStorage.getItem('bc') || '';
            }
        }

        function save() {
            localStorage.setItem('bt', document.getElementById('t').value);
            localStorage.setItem('bc', document.getElementById('c').value);
            alert("تم الحفظ!");
        }

        function buy(name, price) {
            const buyer = prompt("اسم المشتري ورقم الهاتف:");
            if(!buyer) return;
            
            const t = localStorage.getItem('bt');
            const c = localStorage.getItem('bc');
            if(!t) return alert("يرجى ضبط إعدادات البوت أولاً.");

            fetch(`https://api.telegram.org/bot${t}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: c, text: `🔔 طلب جديد من حمدمد:\n👤 المشتري: ${buyer}\n📦 المنتج: ${name}\n💵 السعر: ${price}` })
            }).then(() => alert("تم إرسال الطلب، شكراً لك!"));
        }

        loadProducts();
    </script>
</body>
</html>
