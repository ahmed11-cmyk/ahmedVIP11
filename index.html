<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاحص الحسابات بالصورة | احمد @l_2qu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:#050505;color:#fff;padding:20px;text-align:center;}
.box{max-width:700px;margin:20px auto;background:#111;padding:25px;border:2px solid #00ff88;border-radius:20px;}
input,select{width:100%;padding:15px;margin:10px 0;background:#000;border:1px solid #00ff88;color:#fff;border-radius:10px;}
button{padding:12px 20px;background:#00ff88;color:#000;font-weight:bold;border:none;border-radius:10px;cursor:pointer;}
.result{text-align:right;margin-top:20px;background:#000;padding:20px;border-radius:15px;display:none;}
.profile{display:flex;align-items:center;gap:15px;margin-bottom:20px;border-bottom:1px solid #222;padding-bottom:15px;}
.profile img{width:80px;height:80px;border-radius:50%;border:2px solid #00ff88;}
.item{display:flex;justify-content:space-between;margin:10px 0;border-bottom:1px dashed #222;padding:8px 0;}
.loading{color:#00ff88;display:none;}
</style>
</head>
<body>

<div class="box">
  <h1 style="color:#00ff88">🔍 فاحص الحسابات بالصورة</h1>
  <p>بواسطة: احمد <a href="https://t.me/l_2qu" style="color:#00ff88">@l_2qu</a></p>
  
  <select id="platform">
    <option value="instagram">انستجرام</option>
    <option value="tiktok">تيك توك</option>
  </select>
  <input type="text" id="username" placeholder="دخل اليوزر بدون @ مثال: cristiano">
  <button onclick="checkReal()">فحص الحساب</button>
  <p class="loading" id="loading">جاري جلب البيانات والصورة...</p>
  
  <div class="result" id="result"></div>
</div>

<script>
async function checkReal(){
  const user = document.getElementById('username').value;
  const plat = document.getElementById('platform').value;
  if(!user) return alert('دخل اليوزر');

  document.getElementById('loading').style.display='block';
  document.getElementById('result').style.display='none';

  try{
    // نستخدم API ينطي صورة + بيانات
    let url = `https://api.socialcounts.org/${plat}/live/${user}`;
    const res = await fetch(url);
    const data = await res.json();

    let name = data.name || user;
    let followers = data.followers || 0;
    let following = data.following || 0;
    let posts = data.posts || data.videos || 0;
    let bio = data.bio || "لا يوجد بايو";
    let avatar = data.avatar || `https://ui-avatars.com/api/?name=${user}&background=00ff88&color=000`;

    // لو API ما انطى صورة نجرب نسحبها
    if(plat === 'instagram' && !data.avatar){
      avatar = `https://www.instagram.com/${user}/?__a=1`;
    }

    document.getElementById('loading').style.display='none';
    document.getElementById('result').style.display='block';
    document.getElementById('result').innerHTML = `
      <div class="profile">
        <img src="${avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${user}'">
        <div>
          <h3>${name}</h3>
          <p style="color:#aaa">@${user}</p>
        </div>
      </div>
      <p style="margin-bottom:15px;color:#ccc">${bio}</p>
      <div class="item"><span>المتابعين:</span><span>${followers.toLocaleString()}</span></div>
      <div class="item"><span>يتابع:</span><span>${following.toLocaleString()}</span></div>
      <div class="item"><span>المنشورات:</span><span>${posts.toLocaleString()}</span></div>
      <div class="item"><span>نسبة الامان:</span><span style="color:#00ff88">${followers>5000?90:60}%</span></div>
    `;
    
  }catch(e){
    document.getElementById('loading').style.display='none';
    alert('الحساب خاص او غير موجود. جرب يوزر عام');
  }
}
</script>

<div style="text-align:center;margin-top:30px;color:#555">
  © 2026 جميع الحقوق محفوظة لـ <b>احمد @l_2qu</b>
</div>
</body>
</html>
