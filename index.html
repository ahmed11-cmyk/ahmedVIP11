<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMDHMD Luxury Store | متجر حمدمد الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #d4af37; --bg-dark: #0f1115; --card-bg: #1a1d24; --text-main: #ffffff; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Cairo', sans-serif; margin: 0; }
        
        /* الهيدر */
        header { padding: 30px; text-align: center; border-bottom: 1px solid #333; }
        .logo { font-size: 30px; font-weight: 900; color: var(--primary); }
        
        /* كارد المنتجات */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        
        /* لوحة التحكم المحمية */
        .admin-panel { background: #000; padding: 20px; border-radius: 15px; margin: 20px; border: 1px solid var(--primary); display: none; }
        input { width: 90%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; background: var(--primary); color: #000; margin-top: 10px; }
        .admin-btn { background: transparent; color: #555; border: 1px solid #333; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">HMDHMD STORE</div>
    </header>

    <div class="container" id="products">
        <!-- منتج تجريبي -->
        <div class="card">
            <h3>ساعة ذهبية فاخرة</h3>
            <p>السعر: 450$</p>
            <button onclick="buyNow('ساعة ذهبية فاخرة', '450$')">شراء الآن</button>
        </div>
    </div>

    <!-- زر الدخول للوحة التحكم -->
    <div style="text-align: center;">
        <button class="admin-btn" onclick="openAdmin()">⚙️ دخول المطور</button>
    </div>

    <!-- لوحة الأدمن (مخفية) -->
    <div id="admin-panel" class="admin-panel">
        <h3>🛡️ لوحة تحكم حمدمد</h3>
        <input type="text" id="bot-token" placeholder="ضع توكن البوت هنا">
        <input type="text" id="chat-id" placeholder="ضع الـ Chat ID هنا">
        <button onclick="saveSettings()">حفظ الإعدادات</button>
    </div>

    <script>
        const DEV_CODE = "749515892";

        // فتح اللوحة برمز الحماية
        function openAdmin() {
            const code = prompt("أدخل رمز المطور:");
            if (code === DEV_CODE) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('bot-token').value = localStorage.getItem('bot_t') || '';
                document.getElementById('chat-id').value = localStorage.getItem('bot_c') || '';
            } else {
                alert("رمز خطأ!");
            }
        }

        // حفظ إعدادات البوت
        function saveSettings() {
            localStorage.setItem('bot_t', document.getElementById('bot-token').value);
            localStorage.setItem('bot_c', document.getElementById('chat-id').value);
            alert("تم الحفظ بنجاح!");
        }

        // عملية الشراء وإرسال الطلب للبوت
        function buyNow(item, price) {
            const name = prompt("أدخل اسمك الكريم:");
            if (!name) return;
            
            const token = localStorage.getItem('bot_t');
            const chat = localStorage.getItem('bot_c');

            if (!token || !chat) return alert("البوت غير مفعل، يرجى تفعيل البوت من لوحة التحكم.");

            const msg = `🔔 طلب جديد من موقع حمدمد\n\n👤 المشتري: ${name}\n📦 المنتج: ${item}\n💵 السعر: ${price}`;

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chat, text: msg })
            }).then(() => alert("تم إرسال طلبك للبوت بنجاح!"));
        }
    </script>
</body>
</html>
