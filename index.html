<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0b1120;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(17,24,39,.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:bold;
color:#38bdf8;
letter-spacing:1px;
}

nav a{
color:#fff;
text-decoration:none;
margin:0 12px;
transition:.3s;
}

nav a:hover{
color:#38bdf8;
}

.hero{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.9;
}

.btn{
margin-top:25px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#fff;
color:#2563eb;
font-size:17px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.products{
padding:50px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
}

.card{
background:#111827;
border-radius:18px;
overflow:hidden;
transition:.4s;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:210px;
object-fit:cover;
}

.card h2{
padding:15px;
}

.price{
padding:0 15px;
font-size:22px;
color:#38bdf8;
}

.buy{
margin:15px;
width:calc(100% - 30px);
padding:12px;
border:none;
border-radius:10px;
background:#38bdf8;
color:#fff;
cursor:pointer;
}

footer{
margin-top:50px;
padding:35px;
background:#111827;
text-align:center;
border-top:2px solid #38bdf8;
}

footer h3{
color:#38bdf8;
margin-bottom:8px;
}

footer p{
opacity:.8;
margin:4px 0;
}

.dev{
margin-top:15px;
display:inline-block;
padding:10px 20px;
border:1px solid #38bdf8;
border-radius:30px;
color:#38bdf8;
font-weight:bold;
letter-spacing:1px;
transition:.3s;
}

.dev:hover{
background:#38bdf8;
color:#fff;
}
</style>
</head>

<body>

<header>
<div class="logo">Nova Store</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">المنتجات</a>
<a href="#">العروض</a>
<a href="#">اتصل بنا</a>
</nav>
</header>

<section class="hero">
<h1>مرحبًا بك في Nova Store</h1>
<p>متجر إلكتروني بتصميم عصري وسريع.</p>
<button class="btn">ابدأ التسوق</button>
</section>

<section class="products">

<div class="card">
<img src="https://picsum.photos/400/300?1">
<h2>سماعة لاسلكية</h2>
<div class="price">$39</div>
<button class="buy">أضف للسلة</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?2">
<h2>ساعة ذكية</h2>
<div class="price">$89</div>
<button class="buy">أضف للسلة</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?3">
<h2>كيبورد RGB</h2>
<div class="price">$59</div>
<button class="buy">أضف للسلة</button>
</div>

</section>

<footer>

<h3>Nova Store</h3>
<p>© 2026 جميع الحقوق محفوظة</p>

<div class="dev">
🚀 Designed & Developed by حمدمد
</div>

<p style="margin-top:15px;color:#38bdf8;">
Premium Demo Version
</p>

</footer>

</body>
</html>
