<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMDHMD Luxury Store | متجر حمدمد الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #d4af37; /* اللون الذهبي الملكي */
            --bg-dark: #0f1115;
            --card-bg: #1a1d24;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif; 
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        /* الهيدر الفاخر */
        header { 
            background: rgba(26, 29, 36, 0.85);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 20px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            color: var(--text-main);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none; /* إزالة الخط تحت الرابط */
            transition: transform 0.3s ease;
            display: inline-flex;
            align-items: center;
        }
        .logo:hover {
            transform: scale(1.05);
        }
        .logo span {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .cart-btn { 
            background: linear-gradient(135deg, var(--primary), #aa841e); 
            color: #000; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        /* قسم الهيرو (الواجهة الترحيبية) */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
        }
        .hero h1 {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* شبكة المنتجات */
        .container {
            max-width: 1200px;
            margin: 0 auto 80px auto;
            padding: 0 20px;
        }
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        .product-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
            overflow: hidden;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(212, 175, 55, 0.03), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .product-card:hover::before {
            transform: translateX(100%);
        }
        .product-card:hover { 
            transform: translateY(-10px); 
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .image-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 20px;
            background: #111317;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-card img { 
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .product-card:hover img {
            transform: scale(1.08);
        }

        .product-title { 
            font-size: 20px; 
            font-weight: 700;
            margin-bottom: 10px; 
            color: var(--text-main); 
        }
        .product-price { 
            color: var(--primary); 
            font-size: 22px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .add-to-cart-btn { 
            background: transparent; 
            color: var(--text-main); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            padding: 12px; 
            width: 100%; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px; 
            transition: all 0.3s ease; 
        }
        .add-to-cart-btn:hover { 
            background: var(--text-main); 
            color: #000;
            border-color: var(--text-main);
        }

        /* فوتر حقوق المطور حمدمد */
        footer {
            background: #090a0d;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        .footer-rights {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
        
        /* تأثيرات روابط التليجرام الذكية */
        .tg-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .tg-link:hover {
            color: #fff;
            background-color: #2481cc; /* لون التليجرام الأزرق عند الهوفر */
            text-shadow: none;
        }

        .dev-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 6px 15px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .dev-badge:hover {
            background: #2481cc;
            color: #fff;
            border-color: #2481cc;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header>
        <a href="https://t.me/l_2qu" target="_blank" class="logo">
            <i class="fa-solid fa-crown" style="color:#d4af37; margin-left: 8px;"></i>HMD<span>HMD</span>
        </a>
        
        <button class="cart-btn" id="cart-button">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>السلة (<span id="cart-count">0</span>)</span>
        </button>
    </header>

    <section class="hero">
        <h1>مجموعة الأزياء الفاخرة للجيل الجديد</h1>
        <p>اكتشف أرقى المنتجات الحصرية المصممة خصيصاً لك بأعلى معايير الجودة العالمية.</p>
    </section>

    <div class="container">
        <div class="products-grid" id="products-container"></div>
    </div>

    <footer>
        <p class="footer-rights">جميع الحقوق محفوظة © 2026 | تطوير وتصميم المبدع <a href="https://t.me/l_2qu" target="_blank" class="tg-link">حمدمد</a></p>
        <a href="https://t.me/l_2qu" target="_blank" class="dev-badge">
            <i class="fa-brands fa-telegram" style="margin-left: 5px;"></i> تواصل معي على التليجرام
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
