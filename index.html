<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاحص حسابات تيك توك</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo', sans-serif}
    body{background:linear-gradient(135deg,#000 0%,#1a1a1a 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{background:#111;border:2px solid #ff0050;border-radius:20px;padding:30px;width:100%;max-width:500px;box-shadow:0 0 30px rgba(255,0,80,0.3)}
    h1{text-align:center;color:#ff0050;margin-bottom:20px;font-size:28px}
    input{width:100%;padding:14px;border-radius:10px;border:2px solid #333;background:#222;color:#fff;font-size:16px;margin-bottom:15px;outline:none}
    input:focus{border-color:#ff0050}
    button{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(90deg,#ff0050,#00f2ea);color:#fff;font-size:18px;font-weight:bold;cursor:pointer;transition:0.3s}
    button:hover{transform:scale(1.02)}
    button:disabled{opacity:0.5;cursor:not-allowed}
    .result{margin-top:20px;padding:20px;background:#1a1a1a;border-radius:15px;display:none}
    .result img{width:80px;height:80px;border-radius:50%;border:3px solid #ff0050;margin-bottom:15px}
    .stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333}
    .stat:last-child{border:none}
    .error{color:#ff0050;text-align:center;margin-top:15px}
    .loading{text-align:center;color:#00f2ea}
</style>
</head>
<body>

<div class="box">
    <h1>🔍 فاحص تيك توك</h1>
    <input type="text" id="username" placeholder="اكتب اليوزر بدون @ مثال: 6l.t_">
    <button id="btn" onclick="checkUser()">فحص الحساب</button>
    <div id="loading" class="loading" style="display:none">جاري جلب البيانات...</div>
    <div id="error" class="error"></div>
    
    <div id="result" class="result">
        <center><img id="avatar" src=""></center>
        <h2 id="name" style="text-align:center;margin-bottom:15px"></h2>
        <div class="stat"><span>اليوزر:</span><span id="user"></span></div>
        <div class="stat"><span>المتابعين:</span><span id="followers"></span></div>
        <div class="stat"><span>يتابع:</span><span id="following"></span></div>
        <div class="stat"><span>اللايكات:</span><span id="likes"></span></div>
        <div class="stat"><span>الفيديوهات:</span><span id="videos"></span></div>
        <p id="bio" style="margin-top:15px;color:#aaa;font-size:14px"></p>
    </div>
</div>

<script>
function formatNum(num){
    if(num >= 1000000) return (num/1000000).toFixed(1) + 'M';
    if(num >= 1000) return (num/1000).toFixed(1) + 'K';
    return num.toLocaleString();
}

async function checkUser(){
    const user = document.getElementById('username').value.trim().replace('@','');
    const btn = document.getElementById('btn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');

    if(!user){ error.innerHTML = "اكتب يوزر اول"; return; }
    
    btn.disabled = true;
    loading.style.display = "block";
    error.innerHTML = "";
    result.style.display = "none";

    try{
        // API جديد يشتغل للحسابات الصغيرة
        const res = await fetch(`https://www.tiktok.com/api/user/detail/?uniqueId=${user}`);
        
        if(!res.ok) throw new Error("فشل");
        
        const data = await res.json();
        const u = data.userInfo.user;
        const s = data.userInfo.stats;
        
        document.getElementById('avatar').src = u.avatarLarger;
        document.getElementById('name').innerHTML = u.nickname + (u.verified ? ' ✅' : '');
        document.getElementById('user').innerHTML = '@' + u.uniqueId;
        document.getElementById('followers').innerHTML = formatNum(s.followerCount);
        document.getElementById('following').innerHTML = formatNum(s.followingCount);
        document.getElementById('likes').innerHTML = formatNum(s.heartCount);
        document.getElementById('videos').innerHTML = formatNum(s.videoCount);
        document.getElementById('bio').innerHTML = u.signature || "لا يوجد بايو";
        
        result.style.display = "block";
        
    }catch(e){
        // لو فشل نجرب بروكسي
        try{
            const res2 = await fetch(`https://api.danzan.fun/tiktok/user?username=${user}`);
            const data2 = await res2.json();
            
            document.getElementById('avatar').src = data2.avatar;
            document.getElementById('name').innerHTML = data2.name;
            document.getElementById('user').innerHTML = '@' + data2.username;
            document.getElementById('followers').innerHTML = formatNum(data2.followers);
            document.getElementById('following').innerHTML = formatNum(data2.following);
            document.getElementById('likes').innerHTML = formatNum(data2.likes);
            document.getElementById('videos').innerHTML = formatNum(data2.videos);
            document.getElementById('bio').innerHTML = data2.bio || "لا يوجد بايو";
            
            result.style.display = "block";
        }catch{
            error.innerHTML = "الحساب غير موجود او تيك توك حاظر الجلب";
        }
    }
    
    btn.disabled = false;
    loading.style.display = "none";
}

document.getElementById('username').addEventListener('keypress', function(e){
    if(e.key === 'Enter') checkUser();
});
</script>

</body>
</html>
